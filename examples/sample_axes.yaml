name: demo_axes

# No grid field = one-at-a-time from defaults

slurm:
  partition: gpu
  time: "02:00:00"
  mem: "16G"
  cpus_per_task: 4
  gres: "gpu:1"

launcher: ./launch.sh

parameters:
  learning_rate:
    abbrev: lr
    type: continuous
    low: 1e-4
    high: 1e-2
    scale: log
    steps: 3
    default: 0.001
  optimizer:
    abbrev: opt
    type: discrete
    values: [adam, sgd, adamw]
    default: adam
  batch_size:
    abbrev: bs
    type: discrete
    values: [32, 64, 128]
    default: 64
